<div>Teachable Machine Image Model</div>
<button type="button" onclick="init()">Start</button>
<button type="button" id="switch-btn" onclick="switchCamera()" style="display:none;">切換鏡頭</button>

<div id="webcam-container"></div>
<div id="label-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">

    const URL = "https://teachablemachine.withgoogle.com/models/B4wQQ-hcM/";

    let model, webcam, labelContainer, maxPredictions;
    let currentFacingMode = "user"; // "user" 代表前鏡頭，"environment" 代表後鏡頭
    let isInitialized = false;

    // 1. 初始化模型與相機
    async function init() {
        if (isInitialized) return; // 防止重複點擊 Start

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // 啟動相機
        await startWebcam(currentFacingMode);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; // 清空舊內容
        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }

        // 顯示切換鏡頭按鈕
        document.getElementById("switch-btn").style.display = "inline-block";
        isInitialized = true;
    }

    // 2. 獨立出啟動相機的函式，方便重複呼叫
    async function startWebcam(facingMode) {
        // 如果原本就有相機在執行，先停止它並移除畫面
        if (webcam) {
            await webcam.stop();
            document.getElementById("webcam-container").innerHTML = "";
        }

        // 判斷是否需要左右鏡像翻轉（通常前鏡頭需要翻轉，後鏡頭不需要）
        const flip = (facingMode === "user"); 

        // 建立相機物件
        webcam = new tmImage.Webcam(200, 200, flip);
        
        // 【核心修改】透過內建參數，強迫瀏覽器要求指定的鏡頭（前鏡頭或後鏡頭）
        await webcam.setup({ facingMode: facingMode }); 
        
        await webcam.play();
        
        // 將新的相機畫布塞進 HTML
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        
        // 開始執行辨識迴圈
        window.requestAnimationFrame(loop);
    }

    // 3. 切換鏡頭的按鈕功能
    async function switchCamera() {
        if (!webcam) return;

        // 切換鏡頭狀態
        if (currentFacingMode === "user") {
            currentFacingMode = "environment"; // 改為後鏡頭
        } else {
            currentFacingMode = "user"; // 改為前鏡頭
        }

        // 重新啟動相機
        await startWebcam(currentFacingMode);
    }

    async function loop() {
        if (webcam && webcam.canvas) {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        // 初始化：先假設第一個類別是最高的
        let highestClass = prediction[0];
        
        // 用迴圈跑過所有類別，找出機率最高的那一個
        for (let i = 1; i < maxPredictions; i++) {
            if (prediction[i].probability > highestClass.probability) {
                highestClass = prediction[i];
            }
        }

        // 畫面上直接顯示目前機率最高的類別名稱（例如：有車位 或 沒車位）
        // 並且加上信心度（機率），方便你除錯
        let confidence = (highestClass.probability * 100).toFixed(0); // 轉成百分比，例如 95%
        let resultText = `${highestClass.className} (${confidence}%)`;

        // 顯示在第一個 label 欄位
        if (labelContainer.childNodes[0]) {
            labelContainer.childNodes[0].innerHTML = resultText;
        }
        
        // 清空其他欄位
        for (let i = 1; i < maxPredictions; i++) {
            if (labelContainer.childNodes[i]) {
                labelContainer.childNodes[i].innerHTML = "";
            }
        }
    }
</script>
